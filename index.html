<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🔥 Топ знижок Steam</title>
<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #38bdf8;
    margin-top: 20px;
}

#games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.game {
    background: #1e293b;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
    width: 250px;
    cursor: pointer;
    transition: 0.3s;
}

.game:hover {
    transform: scale(1.05);
    background: #334155;
}

.game img {
    width: 100%;
    border-radius: 8px;
}
</style>
</head>
<body>

<h1>🔥 Топ знижок Steam</h1>
<div id="games">Завантаження...</div>

<script>
// Прокси нужен, чтобы обойти CORS
const PROXY = "https://corsproxy.io/?";

async function loadGames() {
    try {
        // Получаем топовые скидки в Steam (регион Украина)
        let response = await fetch(PROXY + "https://store.steampowered.com/api/featuredcategories/?cc=ua&l=uk");
        let data = await response.json();

        let html = "";

        // Берем первые 8 игр со скидкой
        data.specials.items.slice(0,8).forEach(game => {
            // Цена в гривнях уже в final_price
            let priceUAH = (game.final_price / 100).toFixed(2);

            html += `
            <div class="game" onclick="openGame(${game.id})">
                <h2>${game.name}</h2>
                <img src="${game.header_image}" alt="${game.name}">
                <p>Знижка: -${game.discount_percent}%</p>
                <p>Ціна: ${priceUAH} ₴</p>
            </div>
            `;
        });

        document.getElementById("games").innerHTML = html;

    } catch (e) {
        document.getElementById("games").innerHTML = "❌ Помилка завантаження";
        console.error(e);
    }
}

function openGame(id) {
    window.open(`https://store.steampowered.com/app/${id}?cc=ua`, "_blank");
}

loadGames();
</script>

</body>
</html>
