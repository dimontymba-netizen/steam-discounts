<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Valheim Menu 🛡️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.alphacoders.com/115/1151249.jpg') no-repeat center/cover;
    height: 100vh;
    color: white;
}

/* затемнение */
.overlay {
    background: rgba(0,0,0,0.75);
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* заголовок */
.title {
    font-size: 60px;
    margin-bottom: 40px;
    text-shadow: 0 0 20px black;
}

/* кнопки */
.menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.menu a {
    width: 250px;
    text-align: center;
    padding: 15px;
    background: #0af;
    color: black;
    text-decoration: none;
    font-size: 20px;
    border-radius: 10px;
    transition: 0.2s;
}

.menu a:hover {
    transform: scale(1.1);
    background: #09c;
}

/* футер */
footer {
    position: absolute;
    bottom: 10px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="overlay">

<div class="title">⚔️ VALHEIM</div>

<div class="menu">
<a href="guide.html">📖 Почати гайд</a>
<a href="guide.html#biomes">🌍 Біоми</a>
<a href="guide.html#weapons">⚔️ Зброя</a>
<a href="guide.html#bosses">👹 Боси</a>
</div>

<footer>
Сделано одним человеком
</footer>

</div>

</body>
</html>
