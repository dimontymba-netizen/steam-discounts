<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🔥 Топ знижок Steam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

body {
    background: #121212;
    color: #e0e0e0;
    font-family: 'Roboto', sans-serif;
    text-align: center;
}

h1 {
    color: #ff6f61;
    margin-top: 20px;
    font-weight: 700;
}

#games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.game {
    background: #1f1f1f;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    width: 260px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

.game:hover {
    transform: scale(1.05);
    background: #2c2c2c;
}

.game img {
    width: 100%;
    border-radius: 10px;
}

.game h2 {
    font-size: 18px;
    margin: 10px 0;
    color: #ffd700;
}

.game p {
    font-size: 16px;
    margin: 5px 0;
    color: #ffffff;
}
</style>
</head>
<body>

<h1>🔥 Топ знижок Steam</h1>
<div id="games">Завантаження...</div>

<script>
const container = document.getElementById("games");

// Функция загрузки игр через CheapShark API
async function loadGames() {
    container.innerHTML = "Завантаження...";

    try {
        // Берем топ скидок через CheapShark API (регион UA, Steam)
        const res = await fetch("https://www.cheapshark.com/api/1.0/deals?storeID=1&upperPrice=1000&sortBy=Savings");
        const data = await res.json();

        container.innerHTML = ""; // очищаем контейнер

        // Берем первые 20 игр
        data.slice(0, 20).forEach(game => {
            const title = game.title;
            const price = parseFloat(game.salePrice).toFixed(2);
            const normalPrice = parseFloat(game.normalPrice).toFixed(2);
            const discount = game.savings ? Math.floor(game.savings) : 0;
            const thumb = game.thumb;
            const steamLink = `https://store.steampowered.com/app/${game.steamAppID}?cc=ua`;

            const div = document.createElement("div");
            div.className = "game";
            div.onclick = () => window.open(steamLink, "_blank");
            div.innerHTML = `
                <h2>${title}</h2>
                <img src="${thumb}" alt="${title}">
                <p>Знижка: -${discount}%</p>
                <p>Ціна: ${price} ₴ <span style="text-decoration: line-through; color: #aaa;">${normalPrice} ₴</span></p>
            `;
            container.appendChild(div);
        });

    } catch (e) {
        container.innerHTML = "❌ Помилка завантаження";
        console.error(e);
    }
}

// Запуск при загрузке страницы
loadGames();

// Автообновление каждые 10 минут
setInterval(loadGames, 600000);
</script>

</body>
</html>
