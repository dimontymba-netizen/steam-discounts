<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🔥 Топ знижок Steam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

body {
    background: #121212;
    color: #e0e0e0;
    font-family: 'Roboto', sans-serif;
    text-align: center;
}

h1 {
    color: #ff6f61;
    margin-top: 20px;
    font-weight: 700;
}

#games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.game {
    background: #1f1f1f;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    width: 260px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

.game:hover {
    transform: scale(1.05);
    background: #2c2c2c;
}

.game img {
    width: 100%;
    border-radius: 10px;
}

.game h2 {
    font-size: 18px;
    margin: 10px 0;
    color: #ffd700;
}

.game p {
    font-size: 16px;
    margin: 5px 0;
    color: #ffffff;
}
</style>
</head>
<body>

<h1>🔥 Топ знижок Steam</h1>
<div id="games">Завантаження...</div>

<script>
const PROXY = "https://corsproxy.io/?";

// Список популярных игр (AppID)
const gamesList = [
    105600, // Terraria
    1091500, // Cyberpunk 2077
    578080, // PUBG
    945360, // Valheim
    292030, // The Witcher 3
];

// Функция загрузки игр
async function loadGames() {
    const container = document.getElementById("games");
    container.innerHTML = "Завантаження...";

    for (let appid of gamesList) {
        try {
            const res = await fetch(`${PROXY}https://store.steampowered.com/api/appdetails?appids=${appid}&cc=ua&l=uk`);
            const data = await res.json();
            const game = data[appid].data;

            if (!game || !game.price_overview) continue;

            const price = (game.price_overview.final / 100).toFixed(2);
            const discount = game.price_overview.discount_percent;
            const img = game.header_image;
            const name = game.name;

            const div = document.createElement("div");
            div.className = "game";
            div.onclick = () => window.open(`https://store.steampowered.com/app/${appid}?cc=ua`, "_blank");
            div.innerHTML = `
                <h2>${name}</h2>
                <img src="${img}" alt="${name}">
                <p>Знижка: -${discount}%</p>
                <p>Ціна: ${price} ₴</p>
            `;

            container.appendChild(div);

        } catch (e) {
            console.error("Помилка при завантаженні", appid, e);
        }
    }
}

// Запуск при загрузке страницы
loadGames();

// Автообновление каждые 10 минут (600000 мс)
setInterval(loadGames, 600000);
</script>

</body>
</html>
